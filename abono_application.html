<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Abonos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/modern_agro.css">
</head>
<body>
    <div id="navbar-container"></div>

    <div class="container mt-4 animate-slide-up">
        <h2 id="crop-title" class="dashboard-title">Registrar aplicación de abono</h2>
        
        <div class="agro-card mb-4 animate-slide-up animate-delay-1" style="max-width: 600px;">
            <div class="card-body">
                <form id="abono-form">
                    <div class="mb-3">
                        <label>Fecha programada</label>
                        <input type="date" id="scheduled_date" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Tipo de abono / Nota</label>
                        <input type="text" id="tip" class="form-control" required>
                    </div>
                    <button class="btn-primary w-auto mt-2" type="submit">Registrar abono</button>
                </form>
            </div>
        </div>

        <h3 class="mt-5 mb-3 animate-slide-up animate-delay-2">Historial de aplicaciones de abono</h3>
        <div class="admin-table-container agro-card p-0 overflow-hidden mb-4 animate-slide-up animate-delay-3">
            <table class="agro-table w-100">
                <thead>
                    <tr>
                        <th>Fecha programada</th>
                        <th>Abono</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="abonos-tbody">
                    <!-- Injected via JS -->
                </tbody>
            </table>
        </div>
        <a href="dashboard.html" class="btn-secondary btn-sm d-inline-flex align-items-center text-decoration-none">Volver al dashboard</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/database.js"></script>
    <script src="js/layout.js"></script>

    <script>
        let cropId;
        let currentUser;

        async function initAbonos() {
            await AuthObj.requireAuth();
            renderNavbar('');

            const urlParams = new URLSearchParams(window.location.search);
            cropId = parseInt(urlParams.get('id'), 10);
            currentUser = await AuthObj.getCurrentUser();
            
            const allCrops = await window.DB.getAllCrops();
            const crop = allCrops.find(c => c.id === cropId);

            if (!crop || (crop.user_id !== currentUser.id && !currentUser.is_superuser)) {
                window.location.href = 'dashboard.html';
                return;
            }

            document.getElementById('crop-title').innerText = `Abonos para ${crop.name}`;
            await renderAbonos();
        }

        // DB Helper Methods specifically for Abonos
        // Since Abonos aren't fully migrated to DB class in the same way yet, 
        // we'll handle them via the DB.supabase if it exists, else localDB.
        async function getAbonos() {
            if (window.DB.supabase) {
                const { data, error } = await window.DB.supabase.from('fertilizer_logs').select('*').eq('crop_id', cropId).order('scheduled_date', { ascending: false });
                if (error) console.error(error);
                return data || [];
            }
            const db = window.DB.getLocalDB();
            return db.fertilizer_logs.filter(a => a.crop_id === cropId).sort((a,b) => new Date(b.scheduled_date) - new Date(a.scheduled_date));
        }

        async function addAbono(data) {
            if (window.DB.supabase) {
                const { error } = await window.DB.supabase.from('fertilizer_logs').insert([{
                    ...data,
                    status: 'pendiente'
                }]);
                if (error) console.error(error);
                return;
            }
            const db = window.DB.getLocalDB();
            db.fertilizer_logs.push({id: Date.now(), ...data, status: 'pendiente'});
            window.DB.saveLocalDB(db);
        }

        async function updateAbonoStatus(id, newStatus) {
            if (window.DB.supabase) {
                const { error } = await window.DB.supabase.from('fertilizer_logs').update({ status: newStatus }).eq('id', id);
                if (error) console.error(error);
                return;
            }
            const db = window.DB.getLocalDB();
            const log = db.fertilizer_logs.find(a => a.id === id);
            if(log) log.status = newStatus;
            window.DB.saveLocalDB(db);
        }

        document.getElementById('abono-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            await addAbono({
                crop_id: cropId,
                scheduled_date: document.getElementById('scheduled_date').value,
                tip: document.getElementById('tip').value
            });
            await renderAbonos();
            e.target.reset();
        });

        async function renderAbonos() {
            const abonos = await getAbonos();
            const tbody = document.getElementById('abonos-tbody');
            if (abonos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">Sin aplicaciones registradas.</td></tr>';
                return;
            }

            let html = '';
            abonos.forEach(ab => {
                let statusBadge = '';
                if(ab.status === 'pendiente') statusBadge = '<span class="status-badge status-pending">Pendiente</span>';
                else if(ab.status === 'aplicado') statusBadge = '<span class="status-badge status-success">Aplicado</span>';
                else statusBadge = '<span class="status-badge status-danger">No Aplicado</span>';

                let actions = '';
                if (ab.status === 'pendiente') {
                    actions = `
                        <button onclick="changeStatus(${ab.id}, 'aplicado')" class="action-btn btn-success p-1 text-white border-0 me-1">Aplicar</button>
                        <button onclick="changeStatus(${ab.id}, 'no_aplicado')" class="action-btn btn-danger p-1 text-white border-0">No Aplicar</button>
                    `;
                } else {
                    actions = '<span class="text-muted small">Sin acciones</span>';
                }

                html += `
                    <tr>
                        <td>${ab.scheduled_date}</td>
                        <td>${ab.tip}</td>
                        <td>${statusBadge}</td>
                        <td>${actions}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        window.changeStatus = async function(id, status) {
            await updateAbonoStatus(id, status);
            await renderAbonos();
        };

        document.addEventListener('DOMContentLoaded', initAbonos);
    </script>
</body>
</html>
