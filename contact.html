<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - AgroSmart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/modern_agro.css">
</head>
<body class="page-body">
    <div id="navbar-container"></div>

    <section class="py-5">
        <div class="container animate-slide-up">
            <div class="contact-card agro-card">
                <h2 class="text-center mb-4 dashboard-title">Contáctenos</h2>
                <form id="contact-form">
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" required placeholder="Escribe tu nombre">
                    </div>
                    <div class="form-group">
                        <label>Correo electrónico</label>
                        <input type="email" id="contact_email" required disabled>
                    </div>
                    <div class="form-group">
                        <label>Asunto</label>
                        <input type="text" required>
                    </div>
                    <div class="form-group">
                        <label>Mensaje</label>
                        <textarea rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn-primary mt-3">Enviar mensaje</button>
                </form>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/database.js"></script>
    <script src="js/layout.js"></script>
    <script>
        async function initContact() {
            await AuthObj.requireAuth();
            renderNavbar('');
            const user = await AuthObj.getCurrentUser();
            document.getElementById('contact_email').value = user.email;
            
            document.getElementById('contact-form').addEventListener('submit', (e) => {
                e.preventDefault();
                alert("¡Tu mensaje fue enviado exitosamente!");
                e.target.reset();
                document.getElementById('contact_email').value = user.email;
            });
        }
        document.addEventListener('DOMContentLoaded', initContact);
    </script>
</body>
</html>
