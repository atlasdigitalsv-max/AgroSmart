<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - AgroSmart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/modern_agro.css">
</head>
<body class="page-body">
    <div id="navbar-container"></div>

    <section class="py-5">
        <div class="container animate-slide-up">
            <div class="contact-card agro-card p-4 mx-auto" style="max-width: 600px;">
                <h2 class="text-center mb-4 dashboard-title">Contáctenos</h2>
                <form id="contact-form">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" required placeholder="Escribe tu nombre">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Correo electrónico</label>
                        <input type="email" id="contact_email" class="form-control" required placeholder="Tu correo electrónico">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Asunto</label>
                        <input type="text" class="form-control" required placeholder="Motivo de contacto">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mensaje</label>
                        <textarea rows="5" class="form-control" required placeholder="Escribe tu mensaje aquí..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold">Enviar mensaje</button>
                </form>
            </div>
        </div>
    </section>

    <footer class="bg-light py-4 border-top mt-5">
        <div class="container text-center">
            <p class="text-muted small m-0">&copy; 2026 AgroSmart - El Futuro del Campo.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/database.js"></script>
    <script src="js/layout.js"></script>
    <script>
        async function initContact() {
            if (window.initLayout) await window.initLayout('contact');
            
            const user = await AuthObj.getCurrentUser();
            const emailInput = document.getElementById('contact_email');
            
            if (user && emailInput) {
                emailInput.value = user.email;
                emailInput.disabled = true;
            } else if (emailInput) {
                emailInput.value = '';
                emailInput.disabled = false;
            }
            
            const contactForm = document.getElementById('contact-form');
            if (contactForm) {
                contactForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    window.showSuccessModal('¡Mensaje Enviado!', 'Tu mensaje fue enviado exitosamente al equipo de AgroSmart.');
                    e.target.reset();
                    if (user && emailInput) emailInput.value = user.email;
                });
            }
        }
        document.addEventListener('DOMContentLoaded', initContact);
    </script>
</body>
</html>
