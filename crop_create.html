<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cultivo - AgroSmart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/modern_agro.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body class="page-body">
    <div id="navbar-container"></div>

    <div class="container mt-5 animate-slide-up">
        <div class="agro-card mb-4 mx-auto animate-slide-up animate-delay-1" style="max-width: 600px;">
            <h2 id="form-title">Nuevo cultivo</h2>
            <form id="crop-form">
                <div class="form-group">
                    <label>Nombre del cultivo</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="description" rows="3" required></textarea>
                </div>
                <div class="row">
                    <div class="col-md-6 form-group">
                        <label>Fecha de siembra</label>
                        <input type="date" id="sowing_date" class="form-control" required>
                    </div>
                </div>

                <input type="hidden" id="latitude">
                <input type="hidden" id="longitude">

                <div class="card themed-card mt-4 mb-4 border-0">
                    <div class="card-body p-0">
                        <h5 class="mb-3">Ubicación <span class="text-muted fw-normal fs-6">(haz clic en el mapa o busca una ubicación)</span></h5>
                        <div class="map-search-wrapper">
                            <input id="crop-search-input" type="text" class="form-control map-search-input" placeholder="Buscar ubicación..." />
                            <button id="crop-search-btn" type="button" class="btn-primary map-search-btn btn-sm">Buscar</button>
                        </div>
                        <div id="crop-search-results" class="map-search-results"></div>
                        <div id="crop-map" class="map-container"></div>
                        <div id="climate-feedback" class="mt-3" style="display:none;"></div>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <button type="submit" id="submit-btn" class="btn-primary w-auto">Guardar</button>
                    <a href="dashboard.html" class="btn-secondary btn-sm d-flex align-items-center">Cancelar</a>
                </div>
            </form>
        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/database.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/map-utils.js"></script>
    
    <script>
        let editMode = false;
        let crop = null;
        let mapMarker = null;

        async function initCropForm() {
            await AuthObj.requireAuth();

            const urlParams = new URLSearchParams(window.location.search);
            const cropId = urlParams.get('id');
            const currentUser = await AuthObj.getCurrentUser();

            if (cropId) {
                const crops = await window.DB.getAllCrops();
                crop = crops.find(c => c.id == cropId);
                if(crop && (crop.user_id === currentUser.id || currentUser.is_superuser)) {
                    editMode = true;
                    document.getElementById('form-title').innerText = 'Editar cultivo';
                    document.getElementById('submit-btn').innerText = 'Actualizar';
                    document.getElementById('name').value = crop.name;
                    document.getElementById('description').value = crop.description;
                    document.getElementById('sowing_date').value = crop.sowing_date;
                    document.getElementById('latitude').value = crop.latitude || '';
                    document.getElementById('longitude').value = crop.longitude || '';
                } else {
                    window.location.href = 'dashboard.html';
                    return;
                }
            }
            
            renderNavbar(editMode ? '' : 'crop_create');

            // Initialize Map
            const defaultCenter = [13.7, -89.2];
            let center = defaultCenter;

            if (editMode && crop.latitude && crop.longitude) {
                center = [parseFloat(crop.latitude), parseFloat(crop.longitude)];
            }

            const map = L.map('crop-map', {
                worldCopyJump: true,
                maxBounds: [[-90, -180], [90, 180]],
                maxBoundsViscosity: 0.9
            }).setView(center, 10);

            // Base layer adapts to the current theme (light/dark)
            watchThemeOnMap(map);

            const searchInput = document.getElementById('crop-search-input');
            const searchBtn = document.getElementById('crop-search-btn');
            const resultsContainer = document.getElementById('crop-search-results');

            async function setLocation(lat, lng, label) {
                if (mapMarker) {
                    mapMarker.setLatLng([lat, lng]);
                } else {
                    mapMarker = L.marker([lat, lng]).addTo(map);
                }

                map.setView([lat, lng], 12);
                document.getElementById('latitude').value = lat.toFixed(6);
                document.getElementById('longitude').value = lng.toFixed(6);

                if (label) {
                    mapMarker.bindPopup(label).openPopup();
                }

                await updateClimateFeedback(lat, lng);
            }

            setupMapSearch({
                map,
                searchInput,
                searchBtn,
                resultsContainer,
                onStatusMessage: (msg) => {
                    const feedback = document.getElementById('climate-feedback');
                    feedback.style.display = 'block';
                    feedback.innerHTML = msg;
                },
                onSelectPlace: async ({ lat, lon, place }) => {
                    await setLocation(lat, lon, place.display_name);
                }
            });

            if (editMode && crop.latitude) {
                mapMarker = L.marker(center).addTo(map);
                updateClimateFeedback(center[0], center[1]);
            }

            map.on('click', async (e) => {
                const lat = e.latlng.lat;
                const lng = e.latlng.lng;
                await setLocation(lat, lng);
            });
        }

        document.getElementById('crop-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const currentUser = await AuthObj.getCurrentUser();
            const payload = {
                user_id: editMode ? crop.user_id : currentUser.id,
                name: document.getElementById('name').value,
                description: document.getElementById('description').value,
                sowing_date: document.getElementById('sowing_date').value,
                latitude: document.getElementById('latitude').value || null,
                longitude: document.getElementById('longitude').value || null,
            };

            if (editMode) {
                await window.DB.deleteCrop(crop.id);
                payload.id = crop.id;
            }

            await window.DB.createCrop(payload);
            window.location.href = 'dashboard.html';
        });

        async function updateClimateFeedback(lat, lon) {
            if(!CONFIG.OPENWEATHERMAP_API_KEY) return;
            const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&lang=es&appid=${CONFIG.OPENWEATHERMAP_API_KEY}`;
            const feedback = document.getElementById('climate-feedback');
            feedback.style.display = 'block';
            feedback.innerHTML = 'Consultando clima...';
            try {
                const res = await fetch(url);
                const data = await res.json();
                feedback.innerHTML = `
                <div class="d-flex flex-wrap gap-2 mt-3">
                    <div class="flex-fill p-3 bg-light rounded border text-center"><strong class="d-block mb-1">Temperatura</strong> ${data.main.temp}°C</div>
                    <div class="flex-fill p-3 bg-light rounded border text-center"><strong class="d-block mb-1">Humedad</strong> ${data.main.humidity}%</div>
                    <div class="flex-fill p-3 bg-light rounded border text-center"><strong class="d-block mb-1">Clima</strong> <span class="text-capitalize">${data.weather[0].description}</span></div>
                </div>`;
            } catch (err) {
                feedback.innerHTML = 'Error consultando clima.';
            }
        }

        document.addEventListener('DOMContentLoaded', initCropForm);
    </script>
</body>
</html>
