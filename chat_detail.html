<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/modern_agro.css">
</head>
<body class="page-body">
    <div id="navbar-container"></div>

    <div class="container mt-4 animate-slide-up">
        <div class="chat-container">
            <div class="chat-header">
                <div class="d-flex align-items-center gap-3">
                    <a href="chat_list.html" class="back-btn">←</a>
                    <h2 id="chat-title" class="m-0" style="font-size: 18px;"></h2>
                </div>
                <a href="calls.html" class="btn-secondary btn-sm p-2 rounded-circle d-flex align-items-center justify-content-center" style="width:40px; height:40px;" title="Iniciar Videollamada">📹</a>
            </div>

            <div class="messages-container" id="messagesContainer">
                <!-- Injected via JS -->
            </div>

            <div class="message-input-container">
                <form id="messageForm">
                    <div class="input-wrapper">
                        <textarea id="messageInput" placeholder="Escribe tu mensaje..." rows="1" class="message-input" required></textarea>
                        <button type="submit" class="send-btn">📤</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/database.js"></script>
    <script src="js/layout.js"></script>

    <script>
        let otherUserId;
        let currentUser;
        let displayedCount = 0;

        async function initChat() {
            await AuthObj.requireAuth();
            renderNavbar('');

            const urlParams = new URLSearchParams(window.location.search);
            otherUserId = parseInt(urlParams.get('id'), 10);
            currentUser = await AuthObj.getCurrentUser();
            const otherUser = await window.DB.getUserById(otherUserId);

            if (!otherUser) {
                window.location.href = 'chat_list.html';
                return;
            }

            document.getElementById('chat-title').innerText = otherUser.email;
            
            // Handle Video Call button click
            document.querySelector('[title="Iniciar Videollamada"]').onclick = async (e) => {
                e.preventDefault();
                const roomName = `AgroSmart_${Math.min(currentUser.id, otherUserId)}_${Math.max(currentUser.id, otherUserId)}`;
                await window.DB.sendMessage({
                    sender_id: currentUser.id,
                    receiver_id: otherUserId,
                    text: `[CALL_INVITE:${roomName}]`
                });
                window.location.href = `calls.html?room=${roomName}`;
            };

            await renderMessages();
            
            // Polling for new messages
            setInterval(renderMessages, 3000);
        }

        const messagesContainer = document.getElementById('messagesContainer');

        function scrollBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        async function renderMessages() {
            const msgs = await window.DB.getMessages(currentUser.id, otherUserId);
            // Mark as read
            await window.DB.markAsRead(otherUserId, currentUser.id);

            if (msgs.length === displayedCount && displayedCount !== 0) return;
            displayedCount = msgs.length;

            let html = '';
            msgs.forEach(m => {
                const isSent = m.sender_id === currentUser.id;
                const time = new Date(m.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                let messageText = m.text;
                let extraClass = '';
                
                // Check if it's a call invitation
                if (m.text.startsWith('[CALL_INVITE:')) {
                    const roomName = m.text.replace('[CALL_INVITE:', '').replace(']', '');
                    messageText = `
                        <div class="d-flex flex-column align-items-center gap-2 p-2">
                            <span>🎥 Llamada iniciada</span>
                            <a href="calls.html?room=${roomName}" class="btn-agro py-2 px-3 fw-bold decoration-none text-white ripple" style="font-size: 12px; border-radius: 12px; width: 100%; text-align: center;">UNIRSE AHORA</a>
                        </div>
                    `;
                    extraClass = 'call-invitation';
                }

                html += `
                    <div class="message ${isSent ? 'sent' : 'received'} ${extraClass}">
                        <div class="message-content">
                            ${messageText}
                            <span class="message-time">${time} ${isSent && m.is_read ? '✓✓' : ''}</span>
                        </div>
                    </div>
                `;
            });

            if(msgs.length === 0) {
                html = `<div class="empty-state">👋 Inicia la conversación</div>`;
            }

            messagesContainer.innerHTML = html;
            scrollBottom();
        }

        document.getElementById('messageForm').addEventListener('submit', async e => {
            e.preventDefault();
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if(text === '') return;

            await window.DB.sendMessage({
                sender_id: currentUser.id,
                receiver_id: otherUserId,
                text: text
            });

            input.value = '';
            await renderMessages();
        });

        document.addEventListener('DOMContentLoaded', initChat);
    </script>
</body>
</html>
