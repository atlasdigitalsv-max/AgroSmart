<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videollamadas - AgroSmart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/modern_agro.css">
    <style>
        #meet-container {
            width: 100%;
            height: 700px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: var(--box-shadow);
        }
        .calls-hero {
            text-align: center;
            margin-bottom: 30px;
        }
    </style>
</head>
<body class="page-body">
    <div id="navbar-container"></div>

    <div class="container mt-4 mb-5 animate-slide-up">
        <div class="calls-hero">
            <h1 class="dashboard-title mb-2">📞 Centro de Comunicación</h1>
            <p class="text-muted">Inicia una videollamada segura con el equipo de soporte o con otros agricultores.</p>
        </div>

        <div id="meet-container">
            <!-- Jitsi Meet Iframe will be here -->
             <div class="d-flex flex-column align-items-center justify-content-center h-100 p-5 text-center">
                <div class="fs-1 mb-3">🎥</div>
                <h3 class="fw-bold">¿Listo para empezar?</h3>
                <p class="text-muted mb-4">Haz clic en el botón de abajo para unirte a la sala de conferencias de AgroSmart.</p>
                <button onclick="startMeeting()" class="btn-agro" style="width: auto; padding: 15px 40px;">Unirse a la Reunión</button>
             </div>
        </div>
    </div>

    <!-- Jitsi Meet API Public -->
    <script src='https://meet.jit.si/external_api.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/database.js"></script>
    <script src="js/layout.js"></script>

    <script>
        let api = null;

        async function initCalls() {
            if (window.initLayout) await window.initLayout('chat');
            const user = await AuthObj.requireAuth();

            // Check License Plan for the Country
            const countries = await window.DB.getCountries();
            const country = countries.find(c => String(c.id) === String(user.country_id));
            const plan = country ? (country.plan || 'none') : 'none';

            if (plan !== 'diamante' && plan !== 'esmeralda' && user.role !== 'global_owner') {
                await Swal.fire({
                    icon: 'warning',
                    title: 'Función Pro Restringida',
                    text: `El plan actual de tu región (${plan.toUpperCase()}) no incluye videollamadas. Esta función requiere el plan DIAMANTE o ESMERALDA.`,
                    confirmButtonText: 'Entendido'
                });
                window.location.href = 'dashboard.html';
                return;
            }

            // Auto-join if room is in URL
            const urlParams = new URLSearchParams(window.location.search);
            const room = urlParams.get('room');
            if (room) {
                startMeeting(room);
            }
        }

        function startMeeting(customRoom = null) {
            const user = sessionStorage.getItem('current_user_email') || 'Agricultor';
            const domain = "meet.jit.si";
            const roomName = customRoom || "AgroSmart_Public_Room_" + Math.floor(Math.random() * 1000);
            
            const options = {
                roomName: roomName,
                width: "100%",
                height: "100%",
                parentNode: document.querySelector('#meet-container'),
                lang: 'es',
                userInfo: {
                    displayName: user
                },
                interfaceConfigOverwrite: {
                    APP_NAME: 'AgroSmart Video',
                    DEFAULT_REMOTE_DISPLAY_NAME: 'Cargando...',
                }
            };
            
            document.getElementById('meet-container').innerHTML = ''; 
            api = new JitsiMeetExternalAPI(domain, options);
        }

        document.addEventListener('DOMContentLoaded', initCalls);
    </script>
</body>
</html>
