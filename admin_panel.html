<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - AgroSmart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/modern_agro.css">
</head>
<body class="page-body">
    <div id="navbar-container"></div>

    <div class="container mt-4 animate-slide-up">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h1 class="dashboard-title m-0" style="text-align: left;">Panel de Control</h1>
            <div class="status-badge status-active">Sistema Activo</div>
        </div>
        
        <!-- Stats Row -->
        <div class="row g-4 mb-5 animate-slide-up animate-delay-1">
            <div class="col-md-6">
                <div class="weather-widget d-flex align-items-center justify-content-between p-4 bg-white">
                    <div class="d-flex align-items-center gap-4">
                        <div class="fs-1 text-primary">👥</div>
                        <div>
                            <div class="info-label mb-0">Usuarios Totales</div>
                            <div class="weather-temp" id="total-users">0</div>
                        </div>
                    </div>
                    <div class="p-3 bg-light rounded-circle">⚡</div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="weather-widget d-flex align-items-center justify-content-between p-4 bg-white">
                    <div class="d-flex align-items-center gap-4">
                        <div class="fs-1 text-success">🌾</div>
                        <div>
                            <div class="info-label mb-0">Cultivos Registrados</div>
                            <div class="weather-temp" id="total-crops">0</div>
                        </div>
                    </div>
                    <div class="p-3 bg-light rounded-circle">🌱</div>
                </div>
            </div>
        </div>

        <div class="agro-card border-0 shadow-sm p-0 animate-slide-up animate-delay-2" style="background: var(--card-bg);">
            <div class="p-4 border-bottom border-light d-flex justify-content-between align-items-center">
                <h3 class="m-0 fs-5 fw-bold">Gestión de Usuarios</h3>
                <span class="text-muted small" id="user-count-label">Cargando...</span>
            </div>
            
            <div class="user-list" id="users-tbody">
                <!-- Injected via JS as modern rows -->
            </div>
        </div>

        <div class="mt-5 text-center">
            <a href="dashboard.html" class="btn-secondary d-inline-flex align-items-center gap-2 px-4">
                <span>←</span> Volver al Panel de Control
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/database.js"></script>
    <script src="js/layout.js"></script>

    <script>
        async function initAdmin() {
            await AuthObj.requireAdmin();
            renderNavbar('admin_panel');

            const users = await window.DB.getAllUsers();
            document.getElementById('total-users').innerText = users.length;
            document.getElementById('user-count-label').innerText = `${users.length} miembros registrados`;
            
            let totalCropsCounter = 0;
            const userListContainer = document.getElementById('users-tbody');
            let html = '';

            for (const u of users) {
                const userCrops = await window.DB.getCropsByUser(u.id);
                const cropsCount = userCrops.length;
                totalCropsCounter += cropsCount;
                const date = new Date(u.date_joined).toLocaleDateString('es-ES', { day: '2-digit', month: 'short' });
                
                const roleMark = u.is_superuser ? 
                    '<span class="badge bg-primary-subtle text-primary border border-primary-subtle rounded-pill px-3 py-2 ms-2" style="font-size: 10px;">ADMINISTRADOR</span>' : 
                    '<span class="badge bg-light text-muted border rounded-pill px-3 py-2 ms-2" style="font-size: 10px;">USUARIO</span>';

                html += `
                    <div class="d-flex align-items-center justify-content-between p-4 border-bottom border-light user-row-item">
                        <div class="d-flex align-items-center gap-3">
                            <div class="chat-avatar m-0" style="width: 45px; height: 45px; font-size: 16px;">${u.email[0].toUpperCase()}</div>
                            <div>
                                <div class="d-flex align-items-center">
                                    <strong class="text-main">${u.email}</strong>
                                    ${roleMark}
                                </div>
                                <div class="small text-muted">Miembro desde ${date} • ${cropsCount} cultivos</div>
                            </div>
                        </div>
                        <div class="d-flex gap-2">
                            <a href="admin_user_detail.html?id=${u.id}" class="btn-secondary btn-sm px-3 py-2 text-primary" style="font-size: 12px; border-radius: 12px;">Gestionar</a>
                            ${!u.is_superuser ? `<button onclick="deleteUser(${u.id})" class="btn-secondary btn-sm px-3 py-2 text-danger" style="font-size: 12px; border-radius: 12px;">Eliminar</button>` : ''}
                        </div>
                    </div>
                `;
            }

            document.getElementById('total-crops').innerText = totalCropsCounter;
            
            if(users.length === 0) {
                html = `<div class="p-5 text-center text-muted">No hay usuarios registrados en el sistema.</div>`;
            }
            
            userListContainer.innerHTML = html;
        }

        window.deleteUser = async function(id) {
            if(confirm('¿Seguro de que deseas eliminar a este usuario y todos sus cultivos? Esta acción es irreversible.')) {
                try {
                    await window.DB.deleteUser(id);
                    window.location.reload();
                } catch (err) {
                    alert('Error al eliminar usuario: ' + err.message);
                }
            }
        };

        document.addEventListener('DOMContentLoaded', initAdmin);
    </script>
</body>
</html>
