<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - AgroSmart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/modern_agro.css">
</head>
<body class="page-body">
    <div id="navbar-container"></div>

    <div class="container mt-4 mb-4 animate-slide-up">
        <div class="chat-container mx-auto">
            <div class="chat-header">
                <h2>💬 Mensajería</h2>
            </div>
            
            <div class="chat-list" id="chat-list">
                <!-- Injected via JS -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/database.js"></script>
    <script src="js/layout.js"></script>

    <script>
        async function initChatList() {
            await AuthObj.requireAuth();
            renderNavbar('');

            const currentUser = await AuthObj.getCurrentUser();
            const chatList = document.getElementById('chat-list');
            
            // If admin, show all users except self. If user, show only root.
            let targetUsers = [];
            const allUsers = await window.DB.getAllUsers();
            
            if (currentUser.is_superuser) {
                targetUsers = allUsers.filter(u => u.id !== currentUser.id);
            } else {
                targetUsers = allUsers.filter(u => u.is_superuser);
            }

            let html = '';
            if (targetUsers.length === 0) {
                html = '<div class="p-4 text-center">📭 No hay usuarios para chatear</div>';
            } else {
                for (const u of targetUsers) {
                    const msgs = await window.DB.getMessages(currentUser.id, u.id);
                    const unread = msgs.filter(m => m.receiver_id === currentUser.id && !m.is_read).length;
                    let lastMsg = 'Sin mensajes';
                    if(msgs.length > 0) lastMsg = msgs[msgs.length - 1].text || msgs[msgs.length - 1].message;

                    const badge = unread > 0 ? `<span class="notification-badge">${unread}</span>` : '';

                    html += `
                        <a href="chat_detail.html?id=${u.id}" class="chat-item">
                            <div class="chat-avatar">${u.email[0].toUpperCase()}</div>
                            <div class="chat-info">
                                <h3>${u.email}</h3>
                                <p>${lastMsg}</p>
                            </div>
                            <div>${badge}</div>
                        </a>
                    `;
                }
            }
            chatList.innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', initChatList);
    </script>
</body>
</html>
